<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>miastrbot 管理面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f0f23;color:#e0e0e0;min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:40px 20px}
h1{font-size:2rem;margin-bottom:8px;color:#7dd3fc}
.subtitle{color:#94a3b8;margin-bottom:40px;font-size:.95rem}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.card{background:#1e1e3f;border:1px solid #2a2a5a;border-radius:12px;padding:24px;text-decoration:none;color:inherit;transition:border-color .2s,transform .2s}
.card:hover{border-color:#7dd3fc;transform:translateY(-2px)}
.card h2{font-size:1.1rem;margin-bottom:8px;color:#e2e8f0}
.card p{font-size:.85rem;color:#94a3b8;line-height:1.5}
.card .icon{font-size:2rem;margin-bottom:12px}
.status{display:flex;align-items:center;gap:8px;font-size:.9rem;margin-top:16px}
.dot{width:8px;height:8px;border-radius:50%;background:#94a3b8}
.dot.online{background:#4ade80}
.dot.offline{background:#f87171}
</style>
</head>
<body>
<div class="container">
  <h1>🎵 miastrbot</h1>
  <p class="subtitle">小爱音箱 + 米家设备 · AstrBot 管理面板</p>
  <div class="cards">
    <a href="/miastrbot/api/devices" class="card">
      <div class="icon">📡</div>
      <h2>设备管理</h2>
      <p>查看和控制米家设备，实时状态监控</p>
    </a>
    <a href="/miastrbot/api/status" class="card">
      <div class="icon">📊</div>
      <h2>服务状态</h2>
      <p>小爱音箱、米家、TTS、Agent 连接状态</p>
    </a>
    <a href="/miastrbot/api/config" class="card">
      <div class="icon">⚙️</div>
      <h2>插件配置</h2>
      <p>查看和修改当前配置（请谨慎操作）</p>
    </a>
    <a href="/miastrbot/api/auth/xiaomi" class="card">
      <div class="icon">🔐</div>
      <h2>小爱登录</h2>
      <p>扫码登录小爱音箱服务</p>
    </a>
    <a href="/miastrbot/api/oauth" class="card">
      <div class="icon">📱</div>
      <h2>米家授权</h2>
      <p>扫码授权米家设备控制权限</p>
    </a>
    <a href="/miastrbot/api/logout" class="card">
      <div class="icon">🚪</div>
      <h2>退出登录</h2>
      <p>清除当前登录状态</p>
    </a>
  </div>
</div>
</body>
</html>
